name: Check CLI component versions

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run CLI version check
        id: check
        run: |
          # Run the script and capture output; allow non-zero exit
          set +e
          OUTPUT=$(./scripts/check-cli-versions.sh 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Save output for issue body (multiline)
          {
            echo "report<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create or update issue if updates available
        if: steps.check.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          TITLE="CLI version updates available"
          EXISTING=$(gh issue list --state open --search "$TITLE" --json number --jq '.[0].number // empty')

          # Build issue body without shell indentation artifacts
          {
            echo "## CLI Version Check Report"
            echo ""
            echo "The weekly CLI version check found updates or unreachable endpoints."
            echo ""
            echo '```'
            echo "$REPORT"
            echo '```'
            echo ""
            echo "### Action Required"
            echo "- Run \`./scripts/check-cli-versions.sh\` locally"
            echo "- Update pinned versions in \`rustconn-core/src/cli_download/components.rs\`"
            echo "- Record changes in CHANGELOG.md"
            echo ""
            echo "_Auto-generated by [check-cli-versions workflow](https://github.com/${{ github.repository }}/actions/workflows/check-cli-versions.yml)_"
          } > /tmp/issue-body.md

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/issue-body.md
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body-file /tmp/issue-body.md --label "dependencies"
            echo "Created new issue"
          fi
